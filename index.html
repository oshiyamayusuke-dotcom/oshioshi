<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#16213e">
<meta name="mobile-web-app-capable" content="yes">
<title>営業ツール ポータル</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: Roboto,'Noto Sans JP','Segoe UI','Hiragino Sans','Yu Gothic UI',sans-serif;
  background: #f0f2f5; color: #1a1a2e;
}

/* ===== 共通レイアウト ===== */
.screen { min-height: 100vh; display: none; }
.screen.active { display: block; }
.center {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: 24px;
  background: linear-gradient(135deg,#1a1a2e 0%,#16213e 55%,#0f3460 100%);
}

/* ===== ログイン ===== */
.login-card {
  background: #fff; border-radius: 18px; padding: 40px 36px; width: 100%; max-width: 380px;
  box-shadow: 0 18px 50px rgba(0,0,0,.35); text-align: center;
}
.login-card .logo { font-size: 44px; margin-bottom: 10px; }
.login-card h1 { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
.login-card p.sub { font-size: 13px; color: #888; margin-bottom: 24px; }
.login-card input {
  width: 100%; padding: 13px 14px; border: 1px solid #d5d9e2; border-radius: 10px;
  font-size: 15px; font-family: inherit; margin-bottom: 12px; text-align: center; letter-spacing: 1px;
}
.login-card input:focus { outline: none; border-color: #0066cc; box-shadow: 0 0 0 3px rgba(0,102,204,.15); }
.login-card button {
  width: 100%; padding: 13px; border: none; border-radius: 10px; cursor: pointer;
  background: linear-gradient(135deg,#0066cc,#004db3); color: #fff; font-size: 15px; font-weight: 700;
  font-family: inherit; transition: filter .15s;
}
.login-card button:hover { filter: brightness(1.1); }
.login-err { color: #ef4444; font-size: 13px; font-weight: 600; min-height: 18px; margin-bottom: 4px; }

/* ===== ツール選択 ===== */
.portal-header {
  background: linear-gradient(135deg,#1a1a2e 0%,#16213e 60%,#0f3460 100%);
  color: #fff; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 2px 10px rgba(0,0,0,.3);
}
.portal-header h1 { font-size: 18px; font-weight: 700; letter-spacing: .5px; }
.portal-header button {
  background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.25); color: #fff;
  padding: 7px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; font-family: inherit;
}
.portal-header button:hover { background: rgba(255,255,255,.22); }
.picker { max-width: 900px; margin: 0 auto; padding: 50px 24px; }
.picker h2 { font-size: 22px; font-weight: 800; margin-bottom: 6px; text-align: center; }
.picker p.lead { text-align: center; color: #888; margin-bottom: 36px; font-size: 14px; }
.cards { display: grid; grid-template-columns: repeat(auto-fit,minmax(280px,1fr)); gap: 22px; }
.tool-card {
  background: #fff; border-radius: 18px; padding: 30px 26px; cursor: pointer; text-align: center;
  box-shadow: 0 4px 16px rgba(0,0,0,.08); border: 2px solid transparent; transition: all .18s;
}
.tool-card:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(0,0,0,.15); border-color: #0066cc; }
.tool-card .ic { font-size: 52px; margin-bottom: 14px; }
.tool-card h3 { font-size: 18px; font-weight: 800; margin-bottom: 8px; }
.tool-card p { font-size: 13px; color: #888; line-height: 1.5; }
.tool-card .go {
  display: inline-block; margin-top: 18px; padding: 9px 22px; border-radius: 22px;
  background: linear-gradient(135deg,#0066cc,#004db3); color: #fff; font-size: 13px; font-weight: 700;
}

/* ===== ツール表示 ===== */
#toolScreen { display: none; flex-direction: column; height: 100vh; }
#toolScreen.active { display: flex; }
.tool-bar {
  background: linear-gradient(135deg,#1a1a2e 0%,#16213e 60%,#0f3460 100%);
  color: #fff; padding: 10px 20px; display: flex; align-items: center; gap: 14px;
  box-shadow: 0 2px 10px rgba(0,0,0,.3); flex: 0 0 auto;
}
.tool-bar button {
  background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.25); color: #fff;
  padding: 7px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; font-family: inherit;
}
.tool-bar button:hover { background: rgba(255,255,255,.22); }
.tool-bar .title { font-size: 15px; font-weight: 700; }
#toolFrame { flex: 1 1 auto; width: 100%; border: none; background: #f0f2f5; }
</style>

<style>
/* ===== スマホ専用最適化（Android/iPhone 縦画面） ===== */
@media (max-width: 768px){
  html,body{ -webkit-text-size-adjust:100%; }
  .center{ padding:16px; align-items:flex-start; padding-top:12vh; }
  .login-card{ padding:30px 22px; max-width:100%; border-radius:16px; }
  .login-card .logo{ font-size:40px; }
  .login-card h1{ font-size:18px; }
  .login-card input{ min-height:50px; font-size:16px; }
  .login-card button{ min-height:50px; font-size:16px; }
  .portal-header{ padding:12px 14px; }
  .portal-header h1{ font-size:15px; }
  .portal-header button{ min-height:40px; }
  .picker{ padding:26px 16px; }
  .picker h2{ font-size:19px; }
  .picker p.lead{ font-size:13px; margin-bottom:24px; }
  .cards{ grid-template-columns:1fr !important; gap:16px; }
  .tool-card{ padding:26px 22px; border-radius:16px; }
  .tool-card:active{ transform:scale(.99); border-color:#0066cc; }
  .tool-card .ic{ font-size:46px; margin-bottom:10px; }
  .tool-card h3{ font-size:17px; }
  .tool-card .go{ min-height:44px; display:inline-flex; align-items:center; }
  .tool-bar{ padding:10px 12px; gap:10px; }
  .tool-bar button{ min-height:42px; }
  .tool-bar .title{ font-size:14px; }
}

/* ===== Android追加最適化 ===== */
button, .tool-card { touch-action: manipulation; -webkit-tap-highlight-color: rgba(0,102,204,.15); }
body { overscroll-behavior-y: none; }
@supports (height: 100dvh){
  .screen { min-height: 100dvh; }
  .center { min-height: 100dvh; }
  #toolScreen { height: 100dvh; }
}
@media (max-width: 480px){
  .picker{ padding:20px 14px; }
  .cards{ gap:14px; }
  .tool-card{ padding:22px 18px; }
  .tool-card p{ font-size:12.5px; }
  .tool-bar{ position:sticky; top:0; z-index:10; }
}
</style>
</head>
<body>

<!-- ========== 1. ログイン画面 ========== -->
<div class="screen active" id="loginScreen">
  <div class="center">
    <div class="login-card">
      <div class="logo">🔐</div>
      <h1>営業ツール ポータル</h1>
      <p class="sub">パスワードを入力してください</p>
      <div class="login-err" id="loginErr"></div>
      <input type="password" id="pwInput" placeholder="パスワード" autocomplete="current-password">
      <button id="loginBtn">ログイン</button>
    </div>
  </div>
</div>

<!-- ========== 2. ツール選択画面 ========== -->
<div class="screen" id="pickerScreen">
  <div class="portal-header">
    <h1>🏠 営業ツール ポータル</h1>
    <button id="logoutBtn">ログアウト</button>
  </div>
  <div class="picker">
    <h2>ツールを選択</h2>
    <p class="lead">利用するツールを選び、それぞれのCSVを読み込んでください。</p>
    <div class="cards">
      <div class="tool-card" data-tool="uriage">
        <div class="ic">📊</div>
        <h3>担当売上分析ダッシュボード</h3>
        <p>売上CSVを読み込み、得意先・メーカー・担当者別の分析やグラフを表示します。</p>
        <div class="go">開く →</div>
      </div>
      <div class="tool-card" data-tool="juchu">
        <div class="ic">📋</div>
        <h3>受注残明細ビュー</h3>
        <p>受注残CSVを読み込み、得意先別の明細・納期遅延・粗利を確認します。</p>
        <div class="go">開く →</div>
      </div>
      <div class="tool-card" data-tool="zensha">
        <div class="ic">🏢</div>
        <h3>全社売上分析ダッシュボード</h3>
        <p>売上CSVから全社サマリー・担当者/得意先/メーカー別分析・目標達成率を表示します。</p>
        <div class="go">開く →</div>
      </div>
    </div>
  </div>
</div>

<!-- ========== 3. ツール表示画面 ========== -->
<div class="screen" id="toolScreen">
  <div class="tool-bar">
    <button id="backBtn">← ツール選択に戻る</button>
    <span class="title" id="toolTitle"></span>
  </div>
  <iframe id="toolFrame" title="tool"></iframe>
</div>

// ==== 画面切替 ====
function show(id){
  ["loginScreen","pickerScreen","toolScreen"].forEach(function(s){
    document.getElementById(s).classList.toggle("active", s===id);
  });
}

// ==== ログイン状態の保存（3時間有効） ====
var AUTH_KEY = "portal_authed_at";
var AUTH_TTL = 3 * 60 * 60 * 1000; // 3時間（ミリ秒）
function isAuthed(){
  try {
    var t = parseInt(localStorage.getItem(AUTH_KEY) || "0", 10);
    return t > 0 && (Date.now() - t) < AUTH_TTL;
  } catch(e){ return false; }
}

// ==== ログイン ====
function doLogin(){
  var v = document.getElementById("pwInput").value;
  if(v === PASSWORD){
    document.getElementById("loginErr").textContent = "";
    document.getElementById("pwInput").value = "";
    try { localStorage.setItem(AUTH_KEY, String(Date.now())); } catch(e){}
    show("pickerScreen");
  } else {
    document.getElementById("loginErr").textContent = "パスワードが違います";
    document.getElementById("pwInput").select();
  }
}
document.getElementById("loginBtn").onclick = doLogin;
document.getElementById("pwInput").addEventListener("keydown", function(e){
  if(e.key === "Enter") doLogin();
});

// ==== ログアウト ====
document.getElementById("logoutBtn").onclick = function(){
  var f = document.getElementById("toolFrame");
  f.removeAttribute("srcdoc");
  f.src = "about:blank";
  try { localStorage.removeItem(AUTH_KEY); } catch(e){}
  show("loginScreen");
};

// ==== ツール選択 ====
// base64(UTF-8) を正しく文字列へデコード
function b64ToUtf8(b64){
  var bin = atob(b64);
  var bytes = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new TextDecoder("utf-8").decode(bytes);
}

document.querySelectorAll(".tool-card").forEach(function(card){
  card.onclick = function(){
    var key = card.getAttribute("data-tool");
    var t = TOOLS[key];
    document.getElementById("toolTitle").textContent = t.title;
    // data: URL ではなく srcdoc で読み込む（親と同一オリジンになり localStorage が端末に保存される）
    var frame = document.getElementById("toolFrame");
    frame.removeAttribute("src");
    frame.srcdoc = b64ToUtf8(t.b64);
    show("toolScreen");
  };
});

// ==== 戻る ====
document.getElementById("backBtn").onclick = function(){
  var f = document.getElementById("toolFrame");
  f.removeAttribute("srcdoc");
  f.src = "about:blank";
  show("pickerScreen");
};

// ==== 起動時：3時間以内にログイン済みならパスワードを省略 ====
if (isAuthed()) { show("pickerScreen"); } else { show("loginScreen"); }
</script>
