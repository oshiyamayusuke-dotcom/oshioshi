<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1976d2">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>営業ツール</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#1976d2; --primary-dark:#0d47a1; --primary-light:#42a5f5;
  --bg:#eceff1; --surface:#ffffff; --on-surface:#1a1a2e; --muted:#78909c;
  --danger:#e53935; --radius:16px;
  --elev1:0 1px 3px rgba(0,0,0,.14),0 1px 2px rgba(0,0,0,.10);
  --elev2:0 3px 6px rgba(0,0,0,.16),0 3px 6px rgba(0,0,0,.12);
  --elev4:0 10px 20px rgba(0,0,0,.19),0 6px 6px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{font-family:'Roboto','Noto Sans JP','Hiragino Sans','Yu Gothic UI',sans-serif;
  background:var(--bg); color:var(--on-surface); overscroll-behavior:none;}
button{font-family:inherit;}
.screen{display:none; min-height:100vh; min-height:100dvh;}
.screen.active{display:block;}
#loginScreen.active{display:flex; align-items:center; justify-content:center;
  padding:24px calc(24px + env(safe-area-inset-left)) calc(24px + env(safe-area-inset-bottom));
  background:linear-gradient(160deg,var(--primary) 0%,var(--primary-dark) 100%);}
.login-card{background:var(--surface); border-radius:24px; padding:36px 26px 30px;
  width:100%; max-width:400px; box-shadow:var(--elev4); text-align:center;}
.login-card .logo{width:76px; height:76px; margin:0 auto 16px; border-radius:50%;
  background:linear-gradient(160deg,var(--primary-light),var(--primary));
  display:flex; align-items:center; justify-content:center; font-size:38px; box-shadow:var(--elev2);}
.login-card h1{font-size:21px; font-weight:700; margin-bottom:6px;}
.login-card p.sub{font-size:14px; color:var(--muted); margin-bottom:26px;}
.mdc-field{position:relative; margin-bottom:8px;}
.mdc-field input{width:100%; padding:14px; border:none; border-bottom:2px solid #cfd8dc;
  font-size:16px; background:#f5f7f9; border-radius:12px 12px 0 0; text-align:center;
  letter-spacing:2px; transition:border-color .2s,background .2s;}
.mdc-field input:focus{outline:none; border-bottom-color:var(--primary); background:#eef4fb;}
.login-err{color:var(--danger); font-size:13px; font-weight:500; min-height:20px; margin:6px 0 10px;}
.btn-filled{width:100%; padding:15px; border:none; border-radius:28px; cursor:pointer;
  background:var(--primary); color:#fff; font-size:15px; font-weight:700; letter-spacing:.5px;
  box-shadow:var(--elev2); transition:background .15s, box-shadow .15s;}
.btn-filled:active{background:var(--primary-dark); box-shadow:var(--elev1);}
.appbar{background:var(--primary); color:#fff;
  padding:calc(12px + env(safe-area-inset-top)) 16px 12px;
  display:flex; align-items:center; gap:12px; box-shadow:var(--elev2); position:sticky; top:0; z-index:20;}
.appbar .ttl{font-size:18px; font-weight:500; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.icon-btn{width:40px; height:40px; border:none; background:transparent; color:#fff;
  border-radius:50%; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center;}
.icon-btn:active{background:rgba(255,255,255,.18);}
#pickerScreen{background:var(--bg);}
.picker{padding:20px 16px calc(24px + env(safe-area-inset-bottom));}
.picker .hd{font-size:16px; font-weight:500; color:var(--muted); margin:6px 4px 16px;}
.tool-card{display:flex; align-items:center; gap:16px; width:100%; text-align:left;
  background:var(--surface); border:none; border-radius:var(--radius); padding:20px 18px;
  margin-bottom:14px; cursor:pointer; box-shadow:var(--elev1); transition:box-shadow .15s, transform .1s;}
.tool-card:active{box-shadow:var(--elev2); transform:scale(.99);}
.tool-card .ic{flex:0 0 auto; width:56px; height:56px; border-radius:16px; font-size:28px;
  display:flex; align-items:center; justify-content:center; color:#fff;}
.tool-card.c1 .ic{background:linear-gradient(150deg,#42a5f5,#1976d2);}
.tool-card.c2 .ic{background:linear-gradient(150deg,#ab47bc,#6a1b9a);}
.tool-card .tx{flex:1;}
.tool-card h3{font-size:16px; font-weight:700; margin-bottom:4px;}
.tool-card p{font-size:12.5px; color:var(--muted); line-height:1.5;}
.tool-card .chev{color:#cfd8dc; font-size:22px;}
#toolScreen{background:#f0f2f5;}
#toolScreen.active{display:flex; flex-direction:column; height:100vh; height:100dvh;}
#toolFrame{flex:1 1 auto; width:100%; border:none; background:#f0f2f5;}
</style>
</head>
<body>
<div class="screen active" id="loginScreen">
  <div class="login-card">
    <div class="logo">🔒</div>
    <h1>営業ツール</h1>
    <p class="sub">パスワードを入力してください</p>
    <div class="mdc-field">
      <input type="password" id="pwInput" placeholder="パスワード" autocomplete="current-password">
    </div>
    <div class="login-err" id="loginErr"></div>
    <button class="btn-filled" id="loginBtn">ログイン</button>
  </div>
</div>
<div class="screen" id="pickerScreen">
  <div class="appbar"><span class="ttl">営業ツール</span>
    <button class="icon-btn" id="logoutBtn" title="ログアウト">&#9211;</button></div>
  <div class="picker">
    <div class="hd">ツールを選択</div>
    <button class="tool-card c1" data-tool="uriage">
      <span class="ic">📊</span>
      <span class="tx"><h3>売上分析ダッシュボード</h3>
        <p>売上CSVを読み込み、得意先・メーカー・担当者別に分析・グラフ表示。</p></span>
      <span class="chev">&rsaquo;</span>
    </button>
    <button class="tool-card c2" data-tool="juchu">
      <span class="ic">📋</span>
      <span class="tx"><h3>受注残明細ビュー</h3>
        <p>受注残CSVを読み込み、得意先別の明細・納期遅延・粗利を確認。</p></span>
      <span class="chev">&rsaquo;</span>
    </button>
  </div>
</div>
<div class="screen" id="toolScreen">
  <div class="appbar">
    <button class="icon-btn" id="backBtn" title="戻る">&larr;</button>
    <span class="ttl" id="toolTitle"></span>
  </div>
  <iframe id="toolFrame" title="tool"></iframe>
</div>

function show(id){
  ["loginScreen","pickerScreen","toolScreen"].forEach(function(s){
    document.getElementById(s).classList.toggle("active", s===id);
  });
  window.scrollTo(0,0);
}
function doLogin(){
  var v = document.getElementById("pwInput").value;
  if(v === PASSWORD){
    document.getElementById("loginErr").textContent = "";
    document.getElementById("pwInput").value = "";
    show("pickerScreen");
  } else {
    document.getElementById("loginErr").textContent = "パスワードが違います";
    document.getElementById("pwInput").select();
  }
}
document.getElementById("loginBtn").onclick = doLogin;
document.getElementById("pwInput").addEventListener("keydown", function(e){ if(e.key==="Enter") doLogin(); });
document.getElementById("logoutBtn").onclick = function(){
  document.getElementById("toolFrame").src = "about:blank"; show("loginScreen");
};
document.querySelectorAll(".tool-card").forEach(function(card){
  card.onclick = function(){
    var t = TOOLS[card.getAttribute("data-tool")];
    document.getElementById("toolTitle").textContent = t.title;
    document.getElementById("toolFrame").src = "data:text/html;charset=utf-8;base64," + t.b64;
    show("toolScreen");
  };
});
document.getElementById("backBtn").onclick = function(){
  document.getElementById("toolFrame").src = "about:blank"; show("pickerScreen");
};
</script>
</body>
