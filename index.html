<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>受注残明細（スマホ）</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body { font-family:'Hiragino Sans','Yu Gothic UI','Segoe UI',sans-serif; background:#f0f2f5; color:#1a1a2e; -webkit-text-size-adjust:100%; }

.header {
  background:linear-gradient(135deg,#1a1a2e 0%,#16213e 60%,#0f3460 100%);
  color:#fff; padding:12px 14px; position:sticky; top:0; z-index:100; box-shadow:0 2px 8px rgba(0,0,0,.3);
}
.header h1 { font-size:16px; font-weight:700; display:flex; align-items:center; gap:6px; }
.header .badge-file { display:block; margin-top:4px; font-size:11px; color:rgba(255,255,255,.7); }

.content { padding:12px; }

/* Upload */
.upload-area { border:2px dashed #0066cc; border-radius:14px; padding:26px 16px; text-align:center;
  background:linear-gradient(135deg,#f8f9ff,#eef2ff); margin-bottom:14px; transition:all .2s; }
.upload-area.drag-over { background:linear-gradient(135deg,#e8f0ff,#dde8ff); border-color:#004db3; transform:scale(1.01); }
.upload-icon { font-size:34px; margin-bottom:6px; }
.upload-text { font-size:14px; color:#0066cc; font-weight:700; margin-bottom:4px; }
.upload-sub { font-size:11px; color:#999; }
.btn-file { display:inline-block; margin-top:12px; background:#0066cc; color:#fff; padding:11px 22px; border-radius:10px; font-size:14px; font-weight:700; }

/* KPI 2x2 */
.kpi-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
.kpi-card { background:#fff; border-radius:12px; padding:12px 14px; box-shadow:0 1px 5px rgba(0,0,0,.06); border-left:4px solid #0066cc; }
.kpi-card.warn { border-left-color:#ef4444; }
.kpi-card.good { border-left-color:#10b981; }
.kpi-card.amber { border-left-color:#f59e0b; }
.kpi-label { font-size:11px; color:#888; font-weight:600; margin-bottom:4px; }
.kpi-value { font-size:19px; font-weight:800; line-height:1.15; }
.kpi-sub { font-size:10px; color:#aaa; margin-top:2px; }

/* Controls */
.controls { display:flex; flex-direction:column; gap:10px; margin-bottom:14px; }
.controls input[type=text] { width:100%; padding:12px 14px; border:1px solid #d5d9e2; border-radius:10px; font-size:15px; font-family:inherit; }
.seg { display:flex; border:1px solid #d5d9e2; border-radius:10px; overflow:hidden; }
.seg button { flex:1; border:none; background:#fff; padding:11px 8px; font-size:14px; color:#555; font-family:inherit; font-weight:600; }
.seg button.active { background:#0066cc; color:#fff; }
.row2 { display:flex; gap:10px; }
.row2 > * { flex:1; }
.chk { display:flex; align-items:center; justify-content:center; gap:8px; font-size:14px; color:#444; background:#fff; border:1px solid #d5d9e2; border-radius:10px; padding:11px 8px; font-weight:600; }
.chk input { width:18px; height:18px; }
.sortsel { width:100%; padding:11px 12px; border:1px solid #d5d9e2; border-radius:10px; font-size:14px; font-family:inherit; background:#fff; }
.toggle-all { background:#fff; border:1px solid #d5d9e2; border-radius:10px; padding:11px 8px; font-size:14px; font-weight:600; color:#444; font-family:inherit; }

/* Customer group */
.cust-group { background:#fff; border-radius:12px; box-shadow:0 1px 5px rgba(0,0,0,.06); margin-bottom:12px; overflow:hidden; }
.cust-head { padding:13px 14px; background:linear-gradient(135deg,#1a1a2e,#16213e); color:#fff; display:flex; flex-direction:column; gap:6px; }
.cust-head-top { display:flex; align-items:center; gap:8px; }
.cust-toggle { font-size:12px; width:12px; transition:transform .2s; }
.cust-group.collapsed .cust-toggle { transform:rotate(-90deg); }
.cust-name { font-size:15px; font-weight:700; flex:1; line-height:1.25; }
.cust-delay { background:#ef4444; color:#fff; border-radius:20px; padding:2px 9px; font-size:11px; font-weight:700; white-space:nowrap; }
.cust-stats { display:flex; gap:14px; font-size:12px; flex-wrap:wrap; padding-left:20px; }
.cust-stats .s-label { color:rgba(255,255,255,.55); margin-right:3px; }
.cust-stats b { font-weight:700; }

.cust-group.collapsed .items { display:none; }
.items { padding:10px; display:flex; flex-direction:column; gap:10px; }

/* line item card */
.item { border:1px solid #eef0f5; border-radius:10px; padding:11px 12px; background:#fdfdff; }
.item.overdue { border-color:#fca5a5; background:#fff5f5; }
.item-top { display:flex; align-items:center; gap:8px; margin-bottom:8px; flex-wrap:wrap; }
.badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; }
.b-ship { background:#dcfce7; color:#15803d; }
.b-arr  { background:#dbeafe; color:#1d4ed8; }
.b-ord  { background:#fef3c7; color:#b45309; }
.b-none { background:#fee2e2; color:#b91c1c; }
.due-pill { margin-left:auto; font-size:13px; font-weight:700; color:#555; }
.due-pill.od { color:#ef4444; }
.item-prod { font-size:14px; font-weight:700; color:#1a1a2e; margin-bottom:2px; line-height:1.3; }
.item-prod small { display:block; font-size:11px; color:#999; font-weight:400; margin-top:1px; }
.item-meta { display:grid; grid-template-columns:auto 1fr; gap:3px 10px; font-size:12px; margin-top:8px; }
.item-meta .k { color:#999; white-space:nowrap; }
.item-meta .v { color:#333; text-align:right; font-variant-numeric:tabular-nums; }
.item-meta .v.amt { font-weight:700; }
.item-meta .v.neg { color:#ef4444; font-weight:700; }
.flow { font-size:12px; color:#666; }
.memo { margin-top:7px; font-size:11px; color:#777; background:#f6f7fb; border-radius:6px; padding:6px 8px; word-break:break-word; }

.empty { text-align:center; padding:50px 20px; color:#aaa; }
.footer-note { text-align:center; color:#bbb; font-size:11px; margin:18px 0; line-height:1.5; padding:0 10px; }

@media(min-width:640px){ .content{ max-width:560px; margin:0 auto; } }
</style>
</head>
<body>
<div class="header">
  <h1>📋 受注残明細 <span style="font-weight:400;font-size:12px;opacity:.7">得意先別</span></h1>
  <span class="badge-file" id="fileBadge">CSV未読み込み</span>
</div>

<div class="content">
  <div class="upload-area" id="uploadArea">
    <div class="upload-icon">📁</div>
    <div class="upload-text">CSVをここにドラッグ＆ドロップ、またはタップで選択</div>
    <div class="upload-sub">Shift-JIS / UTF-8 / xlsx に対応</div>
    <div class="btn-file" id="pickBtn">ファイルを選ぶ</div>
    <input type="file" id="fileInput" accept=".csv,.xlsx,.xls" style="display:none">
  </div>

  <div id="dashboard" style="display:none">
    <div class="kpi-grid" id="kpiGrid"></div>

    <div class="controls">
      <input type="text" id="search" placeholder="🔍 得意先・品番・注番で検索">
      <div class="seg" id="scopeSeg">
        <button data-scope="open" class="active">未出荷のみ</button>
        <button data-scope="all">全件</button>
      </div>
      <div class="row2">
        <label class="chk"><input type="checkbox" id="delayOnly"> 遅延のみ</label>
        <button class="toggle-all" id="toggleAll">全て開閉</button>
      </div>
      <select class="sortsel" id="sortSel">
        <option value="amount">並び：金額順</option>
        <option value="count">並び：件数順</option>
        <option value="delay">並び：遅延数順</option>
        <option value="name">並び：名前順</option>
      </select>
    </div>

    <div id="groups"></div>
    <div class="footer-note" id="footNote"></div>
  </div>
</div>

<script>
const COLS = [
  ['得意先コード','custCode'],['得意先名','custName'],['納入先名','shipTo'],
  ['得意先注番','custPO'],['担当者名','person'],
  ['伝票№','slip'],['品番','hinban'],['形式','katashiki'],['一般品名','gname'],
  ['メーカー名','maker'],['数量','qty'],['数量単位','unit'],
  ['単価','price'],['金額','amount'],['入値','cost'],['粗利金額','grossAmt'],['粗利率','grossRate'],
  ['得意先納期','custDue'],['得意先回答','custAns'],
  ['受注日','orderDate'],['発注日','poDate'],['入荷日','arriveDate'],['出荷予定日','shipPlan'],['出荷日','shipDate'],
  ['仕入先名','supplier'],['注文番号','poNumber'],['仕入先回答納期','supAns'],
  ['伝票注釈','memo'],['社内メモ','memo2']
];

function today(){ const d=new Date(); d.setHours(0,0,0,0); return d; }
let RAW=[], STATE={scope:'open', delayOnly:false, search:'', sort:'amount', collapsed:{}, allCollapsed:true};

function parseDate(s){
  if(s==null) return null; s=String(s).trim(); if(!s) return null;
  let m=s.match(/^(\d{2})\/(\d{1,2})\/(\d{1,2})$/); if(m) return new Date(2000+ +m[1],+m[2]-1,+m[3]);
  m=s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})$/); if(m) return new Date(+m[1],+m[2]-1,+m[3]);
  return null;
}
function fmtDate(s){ const d=parseDate(s); return d?(d.getMonth()+1)+'/'+d.getDate():''; }
function num(s){ if(s==null) return 0; const n=parseFloat(String(s).replace(/,/g,'')); return isNaN(n)?0:n; }
function yen(n){ return '¥'+Math.round(n).toLocaleString('ja-JP'); }
function grPct(v){
  if(v==null||v==='') return null;
  if(typeof v==='number') return Math.abs(v)<=1 ? v*100 : v;
  const s=String(v).trim(); if(!s) return null;
  if(s.indexOf('%')>=0) return parseFloat(s.replace('%',''));
  const n=parseFloat(s.replace(/,/g,'')); if(isNaN(n)) return null;
  return Math.abs(n)<=1 ? n*100 : n;
}

function status(r){
  if(r.shipDate) return {label:'出荷済',cls:'b-ship'};
  if(r.arriveDate) return {label:'入荷済',cls:'b-arr'};
  if(r.poDate) return {label:'発注済',cls:'b-ord'};
  return {label:'未発注',cls:'b-none'};
}
function dueDateStr(r){ return r.custAns || r.custDue; }
function isOverdue(r){ if(r.shipDate) return false; const d=parseDate(dueDateStr(r)); return d? d<today():false; }

function ingest(json){
  RAW = json.filter(row => String(row['得意先名']||row['得意先コード']||'').trim()).map(row=>{
    const o={}; COLS.forEach(([jp,key])=>{ const v=row[jp]; o[key]= v==null?'':String(v).trim(); });
    o._amount=num(o.amount); o._gross=num(o.grossAmt); o._qty=num(o.qty);
    o._grPct=grPct(row['粗利率']);
    o._grStr = (o._grPct==null) ? '-' : (o._grPct.toFixed(2)+'%');
    o._overdue=isOverdue(o); o._status=status(o);
    return o;
  });
}
function filtered(){
  const q=STATE.search.trim().toLowerCase();
  return RAW.filter(r=>{
    if(STATE.scope==='open' && r.shipDate) return false;
    if(STATE.delayOnly && !r._overdue) return false;
    if(q){ const hay=[r.custName,r.shipTo,r.hinban,r.katashiki,r.gname,r.maker,r.poNumber,r.custPO,r.person].join(' ').toLowerCase(); if(!hay.includes(q)) return false; }
    return true;
  });
}

function render(){
  const rows=filtered();
  const groups={};
  rows.forEach(r=>{ const k=r.custName||r.custCode||'(不明)'; (groups[k]=groups[k]||[]).push(r); });
  let arr=Object.entries(groups).map(([name,items])=>({
    name, items,
    amount:items.reduce((s,r)=>s+r._amount,0),
    gross:items.reduce((s,r)=>s+r._gross,0),
    count:items.length,
    delay:items.filter(r=>r._overdue).length
  }));
  const s=STATE.sort;
  arr.sort((a,b)=> s==='count'?b.count-a.count : s==='delay'?b.delay-a.delay : s==='name'?a.name.localeCompare(b.name,'ja') : b.amount-a.amount);

  const totAmt=rows.reduce((s,r)=>s+r._amount,0), totGross=rows.reduce((s,r)=>s+r._gross,0);
  const delayCnt=rows.filter(r=>r._overdue).length, gRate=totAmt?(totGross/totAmt*100):0;
  document.getElementById('kpiGrid').innerHTML=`
    <div class="kpi-card"><div class="kpi-label">表示明細</div><div class="kpi-value">${rows.length}</div><div class="kpi-sub">得意先 ${arr.length} 社</div></div>
    <div class="kpi-card amber"><div class="kpi-label">金額合計</div><div class="kpi-value">${yen(totAmt)}</div><div class="kpi-sub">粗利 ${yen(totGross)}</div></div>
    <div class="kpi-card good"><div class="kpi-label">粗利率</div><div class="kpi-value">${gRate.toFixed(1)}%</div><div class="kpi-sub">加重平均</div></div>
    <div class="kpi-card warn"><div class="kpi-label">納期遅延</div><div class="kpi-value">${delayCnt}</div><div class="kpi-sub">未出荷の未達</div></div>`;

  const box=document.getElementById('groups');
  if(!arr.length){ box.innerHTML='<div class="empty">該当する明細がありません。</div>'; document.getElementById('footNote').textContent=''; return; }
  box.innerHTML=arr.map(g=>{
    const collapsed = STATE.collapsed[g.name] ?? STATE.allCollapsed;
    return `<div class="cust-group ${collapsed?'collapsed':''}">
      <div class="cust-head" onclick="toggle('${escAttr(g.name)}')">
        <div class="cust-head-top">
          <span class="cust-toggle">▼</span>
          <span class="cust-name">${esc(g.name)}</span>
          ${g.delay?`<span class="cust-delay">遅延 ${g.delay}</span>`:''}
        </div>
        <div class="cust-stats">
          <span><span class="s-label">明細</span><b>${g.count}</b></span>
          <span><span class="s-label">金額</span><b>${yen(g.amount)}</b></span>
          <span><span class="s-label">粗利</span><b>${g.amount?(g.gross/g.amount*100).toFixed(1):0}%</b></span>
        </div>
      </div>
      <div class="items">${cards(g.items)}</div>
    </div>`;
  }).join('');
  document.getElementById('footNote').textContent=`基準日 ${today().getFullYear()}/${today().getMonth()+1}/${today().getDate()} ｜ 遅延＝得意先回答(無ければ納期)が基準日より前かつ未出荷`;
}

function cards(items){
  items=[...items].sort((a,b)=>{ const da=parseDate(dueDateStr(a)),db=parseDate(dueDateStr(b)); if(da&&db)return da-db; if(da)return -1; if(db)return 1; return 0; });
  return items.map(r=>{
    const st=r._status;
    const due=fmtDate(dueDateStr(r));
    const grNeg=(r._grPct!=null && r._grPct<0);
    const flow=`${fmtDate(r.poDate)||'―'} → ${fmtDate(r.arriveDate)||'―'} → ${fmtDate(r.shipDate)||fmtDate(r.shipPlan)||'―'}${r.shipDate?'':(r.shipPlan?'(予)':'')}`;
    const memo=[r.memo,r.memo2].filter(Boolean).join(' / ');
    return `<div class="item ${r._overdue?'overdue':''}">
      <div class="item-top">
        <span class="badge ${st.cls}">${st.label}</span>
        ${r.custPO?`<span style="font-size:11px;color:#888">注番 ${esc(r.custPO)}</span>`:''}
        <span class="due-pill ${r._overdue?'od':''}">納期 ${due||'—'}${r._overdue?' ⚠':''}</span>
      </div>
      <div class="item-prod">${esc(r.hinban||r.gname||'—')}<small>${esc([r.katashiki,r.gname].filter(Boolean).join(' / '))}</small></div>
      <div class="item-meta">
        <span class="k">数量</span><span class="v">${r._qty?r._qty.toLocaleString():''} ${esc(r.unit)}</span>
        <span class="k">金額</span><span class="v amt">${yen(r._amount)}</span>
        <span class="k">粗利率</span><span class="v ${grNeg?'neg':''}">${r._grStr}</span>
        <span class="k">メーカー</span><span class="v">${esc(r.maker)||'—'}</span>
        <span class="k">仕入先</span><span class="v">${esc(r.supplier)||'—'}</span>
        <span class="k">手配<br><small style="color:#bbb">発注→入荷→出荷</small></span><span class="v flow">${flow}</span>
      </div>
      ${memo?`<div class="memo">${esc(memo)}</div>`:''}
    </div>`;
  }).join('');
}

function esc(s){ return (s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function escAttr(s){ return esc(s).replace(/'/g,"\\'"); }
window.toggle=function(name){ STATE.collapsed[name]=!(STATE.collapsed[name] ?? STATE.allCollapsed); render(); };

// ---- ファイル読み込み（ドラッグ＆ドロップ / タップ選択）----
const uploadArea=document.getElementById('uploadArea'), fileInput=document.getElementById('fileInput');
document.getElementById('pickBtn').onclick=e=>{ e.stopPropagation(); fileInput.click(); };
uploadArea.onclick=()=>fileInput.click();
uploadArea.ondragover=e=>{ e.preventDefault(); uploadArea.classList.add('drag-over'); };
uploadArea.ondragleave=()=>uploadArea.classList.remove('drag-over');
uploadArea.ondrop=e=>{ e.preventDefault(); uploadArea.classList.remove('drag-over'); if(e.dataTransfer.files[0]) readFile(e.dataTransfer.files[0]); };
fileInput.onchange=e=>{ if(e.target.files[0]) readFile(e.target.files[0]); e.target.value=''; };
// ページ全体へのドロップでも読み込めるように
window.addEventListener('dragover', e=>e.preventDefault());
window.addEventListener('drop', e=>{ e.preventDefault(); if(e.dataTransfer && e.dataTransfer.files[0]) readFile(e.dataTransfer.files[0]); });

function applyJson(json, name){
  if(!json.length){ alert('データが見つかりませんでした。'); return; }
  ingest(json);
  document.getElementById('fileBadge').textContent=name+' ｜ '+RAW.length+'明細';
  document.getElementById('dashboard').style.display='block';
  uploadArea.style.padding='14px'; uploadArea.querySelector('.upload-text').textContent='別のCSVを読み込む';
  document.querySelector('.upload-icon').style.display='none';
  render();
}
function readFile(file){
  const isCSV=/\.csv$/i.test(file.name);
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const buf=new Uint8Array(ev.target.result);
      if(isCSV){
        let text=new TextDecoder('utf-8',{fatal:false}).decode(buf);
        if((text.match(/�/g)||[]).length>5) text=new TextDecoder('shift_jis').decode(buf);
        if(text.charCodeAt(0)===0xFEFF) text=text.slice(1);
        const wb=XLSX.read(text,{type:'string',cellDates:true,raw:false});
        applyJson(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''}), file.name);
      } else {
        const wb=XLSX.read(buf,{type:'array',cellDates:true});
        applyJson(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''}), file.name);
      }
    }catch(e){ alert('読込エラー: '+e.message); }
  };
  reader.readAsArrayBuffer(file);
}

// ---- controls ----
document.getElementById('search').oninput=e=>{ STATE.search=e.target.value; render(); };
document.getElementById('delayOnly').onchange=e=>{ STATE.delayOnly=e.target.checked; render(); };
document.getElementById('sortSel').onchange=e=>{ STATE.sort=e.target.value; render(); };
document.querySelectorAll('#scopeSeg button').forEach(b=>b.onclick=()=>{ document.querySelectorAll('#scopeSeg button').forEach(x=>x.classList.remove('active')); b.classList.add('active'); STATE.scope=b.dataset.scope; render(); });
document.getElementById('toggleAll').onclick=()=>{ STATE.allCollapsed=!STATE.allCollapsed; STATE.collapsed={}; render(); };
</script>
</body>
</html>
