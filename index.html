<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>業務ツール</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{font-family:'Hiragino Sans','Yu Gothic UI','Segoe UI',sans-serif;background:#e9ebf0;color:#1a1a2e;-webkit-text-size-adjust:100%;}
.wrap{max-width:480px;margin:0 auto;min-height:100vh;background:#f0f2f5;box-shadow:0 0 24px rgba(0,0,0,.08);position:relative;overflow-x:hidden;}

/* ---- auth gate ---- */
#authGate{position:fixed;inset:0;z-index:100000;display:flex;align-items:center;justify-content:center;padding:20px;
  background:linear-gradient(135deg,#1a1a2e 0%,#16213e 60%,#0f3460 100%);}
#authGate.hidden{display:none;}
.auth-box{background:#fff;border-radius:18px;padding:32px 26px 24px;width:100%;max-width:340px;box-shadow:0 14px 44px rgba(0,0,0,.4);text-align:center;}
.auth-logo{font-size:42px;margin-bottom:8px;}
.auth-title{font-size:17px;font-weight:800;color:#1a1a2e;margin-bottom:5px;}
.auth-sub{font-size:12px;color:#8890a4;margin-bottom:22px;}
.auth-input{width:100%;padding:14px;border:1.5px solid #e0e4f0;border-radius:10px;font-size:16px;font-family:inherit;text-align:center;letter-spacing:3px;transition:border-color .2s,box-shadow .2s;}
.auth-input:focus{outline:none;border-color:#0066cc;box-shadow:0 0 0 3px rgba(0,102,204,.12);}
.auth-btn{width:100%;margin-top:14px;padding:14px;border:none;border-radius:10px;background:#0066cc;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s,transform .05s;}
.auth-btn:hover{background:#0050a3;} .auth-btn:active{transform:translateY(1px);}
.auth-err{color:#dc2626;font-size:12px;font-weight:700;margin-top:12px;min-height:16px;}
.auth-note{color:#aeb4c6;font-size:11px;margin-top:16px;line-height:1.5;}

/* ---- tool selector ---- */
#toolSelect{display:none;padding:0 0 40px;}
.sel-header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 60%,#0f3460 100%);color:#fff;padding:22px 18px;box-shadow:0 2px 10px rgba(0,0,0,.3);}
.sel-header h1{font-size:18px;font-weight:800;}
.sel-header p{font-size:12px;color:rgba(255,255,255,.7);margin-top:4px;}
.sel-logout{position:absolute;top:16px;right:14px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.28);color:#fff;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
.sel-body{padding:20px 16px;display:flex;flex-direction:column;gap:16px;}
.sel-lead{font-size:13px;font-weight:700;color:#555;margin-bottom:-2px;}
.tool-card{background:#fff;border-radius:16px;padding:22px 20px;box-shadow:0 2px 12px rgba(0,0,0,.08);border:1.5px solid transparent;cursor:pointer;display:flex;align-items:center;gap:16px;transition:transform .12s,box-shadow .12s,border-color .12s;}
.tool-card:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(0,0,0,.12);border-color:#0066cc;}
.tool-card:active{transform:scale(.99);}
.tool-ico{font-size:38px;line-height:1;flex:0 0 auto;}
.tool-txt .t{font-size:16px;font-weight:800;color:#1a1a2e;}
.tool-txt .d{font-size:12px;color:#888;margin-top:3px;line-height:1.4;}
.tool-arrow{margin-left:auto;font-size:20px;color:#0066cc;flex:0 0 auto;}
.sel-note{font-size:11px;color:#aab;text-align:center;line-height:1.6;margin-top:6px;}

/* ---- tool host (iframe) ---- */
#toolHost{display:none;flex-direction:column;height:100vh;height:100dvh;}
.host-bar{flex:0 0 auto;display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;padding:9px 12px;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.host-back{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.28);color:#fff;padding:7px 12px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;}
.host-back:hover{background:rgba(255,255,255,.26);}
.host-title{font-size:14px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#toolFrame{flex:1 1 auto;width:100%;border:none;background:#f0f2f5;}
</style>
</head>
<body>

<!-- ===== AUTH ===== -->
<div id="authGate">
  <div class="auth-box">
    <div class="auth-logo">&#128274;</div>
    <div class="auth-title">業務ツール</div>
    <div class="auth-sub">パスワードを入力してください</div>
    <input type="password" class="auth-input" id="authInput" placeholder="パスワード" autocomplete="current-password" onkeydown="if(event.key==='Enter'){tryLogin();}">
    <button class="auth-btn" onclick="tryLogin()">ログイン</button>
    <div class="auth-err" id="authErr"></div>
    <div class="auth-note">&#128241; iPhone・Android・PC 対応<br>&#9200; 3時間経過・ブラウザを閉じると再ログインが必要です</div>
  </div>
</div>

<div class="wrap">
  <!-- ===== TOOL SELECT ===== -->
  <div id="toolSelect">
    <div class="sel-header" style="position:relative;">
      <h1>&#128188; 業務ツール</h1>
      <p>使用するツールを選んでください</p>
      <button class="sel-logout" onclick="logout()">&#128682; ログアウト</button>
    </div>
    <div class="sel-body">
      <div class="sel-lead">ツールを選択</div>
      <div class="tool-card" onclick="openTool('sales')">
        <div class="tool-ico">&#128202;</div>
        <div class="tool-txt">
          <div class="t">営業売上分析ダッシュボード</div>
          <div class="d">売上・粗利・目標達成率を分析。月別／得意先別／年度比較など</div>
        </div>
        <div class="tool-arrow">&#8250;</div>
      </div>
      <div class="tool-card" onclick="openTool('order')">
        <div class="tool-ico">&#128203;</div>
        <div class="tool-txt">
          <div class="t">受注残明細ビュー</div>
          <div class="d">得意先別の受注残・納期遅延を確認。未出荷／遅延の絞り込み</div>
        </div>
        <div class="tool-arrow">&#8250;</div>
      </div>
      <div class="sel-note">それぞれのツールでCSV / Excelを読み込んでください。<br>データは端末外に送信・保存されません。</div>
    </div>
  </div>

  <!-- ===== TOOL HOST ===== -->
  <div id="toolHost">
    <div class="host-bar">
      <button class="host-back" onclick="backToSelect()">&#8249; ツール選択</button>
      <span class="host-title" id="hostTitle"></span>
      <button class="host-back" onclick="logout()">&#128682;</button>
    </div>
    <iframe id="toolFrame" title="tool"></iframe>
  </div>
</div>

    var val=inp?inp.value:'';
    if(val===PASSWORD){ try{ sessionStorage.setItem(KEY,String(Date.now()+TTL)); }catch(e){} if(err)err.textContent=''; showSelect(); }
    else { if(err)err.textContent='パスワードが違います'; if(inp){ inp.value=''; inp.focus(); } }
  };
  window.logout=function(){ try{ sessionStorage.removeItem(KEY); }catch(e){} location.reload(); };

  function b64ToBlobUrl(id){
    if(frameUrls[id]) return frameUrls[id];
    var b64=document.getElementById(id).textContent.trim();
    var bin=atob(b64);
    var bytes=new Uint8Array(bin.length);
    for(var i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
    var url=URL.createObjectURL(new Blob([bytes],{type:'text/html;charset=utf-8'}));
    frameUrls[id]=url; return url;
  }

  window.openTool=function(kind){
    var cfg = kind==='sales'
      ? {id:'app-sales', title:'\uD83D\uDCCA 営業売上分析ダッシュボード'}
      : {id:'app-order', title:'\uD83D\uDCCB 受注残明細ビュー'};
    document.getElementById('hostTitle').textContent=cfg.title;
    document.getElementById('toolFrame').src=b64ToBlobUrl(cfg.id);
    document.getElementById('toolSelect').style.display='none';
    document.getElementById('toolHost').style.display='flex';
  };
  window.backToSelect=function(){
    document.getElementById('toolFrame').src='about:blank';
    document.getElementById('toolHost').style.display='none';
    document.getElementById('toolSelect').style.display='block';
  };

  function boot(){ if(isAuthed()){ showSelect(); } else { var inp=document.getElementById('authInput'); if(inp) inp.focus(); } }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',boot); else boot();
})();
</script>
</body>
</html>
